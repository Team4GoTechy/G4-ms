spring:
  application:
    name: G4-ms-1
  main:
    lazy-initialization: true
  datasource:
    url: jdbc:postgresql://localhost:5432/petshop_ecommerce
    username: petshop_admin
    password: petshop_secure_pass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        'format_sql': true
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

app:
  jwt:
    secret: ${JWT_SECRET:PETSHOP_SECRET_KEY_256_BITS_MIN_FOR_HS256_ALGORITHM_2026}
    expiration-ms: 86400000

server:
  port: 8080

logging:
  level:
    'com.team4.petstore': DEBUG
    'org.springframework.security': DEBUG

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha