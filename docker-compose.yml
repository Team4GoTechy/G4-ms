version: '3.8'
services:
  db:
    image: postgres:15-alpine
    container_name: petshop-db
    environment:
      POSTGRES_USER: petshop_admin
      POSTGRES_PASSWORD: petshop_secure_pass
      POSTGRES_DB: petshop_ecommerce
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
volumes:
  postgres_data: