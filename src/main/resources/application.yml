spring:
  application:
    name: G4-ms-1
  main:
    lazy-initialization: true
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:petshop_ecommerce}
    username: ${DB_USER:petshop_admin}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        'format_sql': true
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

app:
  jwt:
    secret: ${JWT_SECRET:}
    expiration-ms: 86400000

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:}
  api-key: ${CLOUDINARY_API_KEY:}
  api-secret: ${CLOUDINARY_API_SECRET:}
  default-avatars:
    admin: ${CLOUDINARY_AVATAR_ADMIN:https://res.cloudinary.com/demo/image/upload/v1/defaults/admin_default.png}
    doctor: ${CLOUDINARY_AVATAR_DOCTOR:https://res.cloudinary.com/demo/image/upload/v1/defaults/doctor_default.png}
    cliente: ${CLOUDINARY_AVATAR_CLIENTE:https://res.cloudinary.com/demo/image/upload/v1/defaults/cliente_default.png}

server:
  port: 8080

logging:
  level:
    'com.team4.petstore': DEBUG
    'org.springframework.security': DEBUG

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha